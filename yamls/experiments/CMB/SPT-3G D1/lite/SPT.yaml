likelihood:
  #--------------------------------------------------------------
  #this is SPT-3GD1 TnE
  candl_like:
    additional_args: {}
    clear_internal_priors: true
    data_set_file: !!python/name:spt_candl_data.SPT3G_D1_TnE ''
    external: !!python/name:candl.interface.CandlCobayaLikelihood ''
    variant: "lite"
    feedback: true
    wrapper: null
  #--------------------------------------------------------------
  #this is SPT lensing (muse3glike)
  muse3glike.cobaya.spt3g_2yr_delensed_ee_optimal_pp_muse:
    components:
    - "\u03D5\u03D5"
  #--------------------------------------------------------------
prior:
  gaussian_Tcal: 'lambda Tcal: stats.norm.logpdf(Tcal, loc=1.0, scale=0.0036)'
params:
  #SPT
  Tcal:
    prior:
      max: 1.2
      min: 0.8
    ref: 1.0
    latex: T_{\rm cal}
  Ecal:
    prior:
      max: 1.2
      min: 0.8
    ref: 1.0
    latex: E_{\rm cal}

  #Cosmology here
  # Keep in mind that you may want to include a Planck low-E likelihood, or alternatively impose a prior on tau, to properly constrain the optical depth at reionization.
 
